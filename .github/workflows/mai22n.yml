yamlname: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish PixelWorldsProxy/PixelWorldsProxy.csproj -c Release -r win-x64 --self-contained true -o ./output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PixelWorldsProxy
          path: ./output/
